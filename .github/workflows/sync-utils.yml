# ============================================================
# sync-utils.yml
# Pulls the latest shared utilities from ffd-station-display-utils
# and opens a PR against this repo's staging branch.
#
# Triggers:
#   - repository_dispatch (event: utils-updated) — fired automatically
#     by ffd-station-display-utils notify-workers.yml when utils change
#   - workflow_dispatch — manual trigger from the Actions tab
#
# The PR is opened against staging (not main) to match the
# project-wide workflow: test on staging, then merge to main.
# ============================================================
name: Sync shared utils

on:
  workflow_dispatch:
  repository_dispatch:
    types: [utils-updated]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout this repo at staging branch
        uses: actions/checkout@v4
        with:
          ref: staging
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout ffd-station-display-utils at staging branch
        uses: actions/checkout@v4
        with:
          repository: wehnerb/ffd-station-display-utils
          ref: staging
          path: .utils-source
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from utils repo
        id: version
        run: echo "version=$(cat .utils-source/VERSION)" >> $GITHUB_OUTPUT

      - name: Copy utils into src/shared/
        run: |
          mkdir -p src/shared
          rm -rf src/shared/*
          cp -r .utils-source/utils/. src/shared/
          cp .utils-source/VERSION src/shared/VERSION
          rm -rf .utils-source

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && git diff --staged --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: No changes — exit cleanly
        if: steps.changes.outputs.changed == 'false'
        run: echo "src/shared is already up to date with utils v${{ steps.version.outputs.version }}. No PR needed."

      - name: Commit changes to sync branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b sync-utils-v${{ steps.version.outputs.version }}
          git add src/shared/
          git commit -m "chore: sync shared utils to v${{ steps.version.outputs.version }}"

      - name: Push sync branch
        if: steps.changes.outputs.changed == 'true'
        run: git push origin sync-utils-v${{ steps.version.outputs.version }} --force

      - name: Open PR against staging
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base staging \
            --head sync-utils-v${{ steps.version.outputs.version }} \
            --title "chore: sync shared utils to v${{ steps.version.outputs.version }}" \
            --body "Automated sync from \`ffd-station-display-utils\` v${{ steps.version.outputs.version }}.

          Changes: updated \`src/shared/\` with latest utils.

          Review the diff, test on staging, and merge when ready.
          If no changes are needed, close this PR and delete the branch." \
          2>/dev/null || echo "PR already exists for this branch — skipping."
